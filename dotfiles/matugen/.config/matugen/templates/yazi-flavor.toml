"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }

hovered         = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container_high.default.hex}}", bold = true }
preview_hovered = { underline = true }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", bold = true }
find_position = { fg = "{{colors.secondary.default.hex}}", italic = true }

marker_copied  = { fg = "{{colors.tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}" }
marker_cut     = { fg = "{{colors.error.default.hex}}",    bg = "{{colors.error.default.hex}}" }
marker_marked  = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }
marker_selected = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

tab_active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
tab_inactive = { fg = "{{colors.on_surface_variant.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

[status]
overall = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container_low.default.hex}}" }

mode_normal = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}", bold = true }
mode_select = { fg = "{{colors.on_tertiary.default.hex}}", bg = "{{colors.tertiary.default.hex}}", bold = true }
mode_unset  = { fg = "{{colors.on_error.default.hex}}", bg = "{{colors.error.default.hex}}", bold = true }

progress_label  = { fg = "{{colors.on_surface.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}", bg = "{{colors.surface_container_low.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}", bg = "{{colors.surface_container_low.default.hex}}" }

[filetype]
rules = [
    { mime = "image/*",       fg = "{{colors.tertiary.default.hex}}" },
    { mime = "video/*",       fg = "{{colors.tertiary.default.hex}}" },
    { mime = "audio/*",       fg = "{{colors.tertiary.default.hex}}" },
    { mime = "application/pdf", fg = "{{colors.error.default.hex}}" },
    { mime = "application/zip", fg = "{{colors.secondary.default.hex}}" },
    { mime = "application/x-tar", fg = "{{colors.secondary.default.hex}}" },
    { mime = "text/*",        fg = "{{colors.on_surface.default.hex}}" },
    { name = "*.toml",        fg = "{{colors.primary.default.hex}}" },
    { name = "*.yaml",        fg = "{{colors.primary.default.hex}}" },
    { name = "*.json",        fg = "{{colors.primary.default.hex}}" },
    { name = "*.lua",         fg = "{{colors.secondary.default.hex}}" },
    { name = "*.sh",          fg = "{{colors.secondary.default.hex}}" },
]
